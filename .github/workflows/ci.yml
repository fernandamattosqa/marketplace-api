name: QA API CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  qa-validation:
    runs-on: ubuntu-latest
    env:
      CI_STRICT: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API test suite (non-blocking for bug-report workflow)
        id: test_run
        shell: bash
        run: |
          set +e
          npm test
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate evidence
        run: npm run report:evidence

      - name: Generate performance baseline
        run: npm run report:perf

      - name: Generate HTML dashboard
        run: npm run report:html

      - name: Upload QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifacts
          if-no-files-found: error
          path: |
            docs/relatorio-dashboard.html
            docs/relatorio-executivo.md
            docs/evidencias-automatica.md
            docs/evidencias-requisicoes.md
            docs/performance-baseline.json
            docs/performance-baseline.md
            docs/parte3-bugs.md

      - name: Build summary
        shell: bash
        run: |
          echo "## QA Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test command: npm test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test exit code: ${{ steps.test_run.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reports generated: evidence, performance baseline, dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.test_run.outputs.exit_code }}" != "0" ]; then
            echo "Observação: falhas funcionais podem ser esperadas neste desafio para evidenciar bugs da mock API." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce strict mode
        if: env.CI_STRICT == 'true' && steps.test_run.outputs.exit_code != '0'
        run: |
          echo "CI_STRICT=true e a suíte falhou. Encerrando job com erro."
          exit 1
